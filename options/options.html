<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>noncey — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div id="app">
    <h1>noncey settings</h1>

    <!-- ── Tab bar ───────────────────────────────────────────────────────── -->
    <div id="tab-bar">
      <button class="tab-btn active" data-tab="configs">Configurations</button>
      <button class="tab-btn" data-tab="server">Server Settings</button>
    </div>

    <!-- ── Tab 1: Configurations ─────────────────────────────────────────── -->
    <div id="tab-configs" class="tab-panel">

      <!-- List view -->
      <div id="view-list">
        <div id="config-table-container">
          <p class="muted" id="configs-placeholder">Log in to load configurations.</p>
        </div>
        <div id="config-actions-bar">
          <button id="sync-btn" class="btn-primary">Sync with Server</button>
          <button id="new-config-btn">New Configuration</button>
          <button id="marketplace-btn">Marketplace</button>
        </div>
      </div>

      <!-- Detail view (hidden by default) -->
      <div id="view-detail" class="hidden">
        <button id="back-btn" class="btn-small">&#8592; Back</button>

        <!-- Top card: name, status, channels -->
        <div id="detail-info-card" class="card"></div>

        <!-- Bottom card: prompt -->
        <div class="card">
          <h2>Prompt</h2>
          <div id="detail-prompt-content"></div>
        </div>
      </div>

    </div>

    <!-- ── Tab 2: Server Settings ─────────────────────────────────────────── -->
    <div id="tab-server" class="tab-panel hidden">
      <section id="section-account">
        <h2>Account</h2>

        <div class="field">
          <label for="server">Server URL</label>
          <input id="server" type="url" placeholder="https://nonces.yourdomain.com"
                 spellcheck="false" autocomplete="off">
        </div>

        <div id="auth-status"></div>

        <div id="login-form" class="hidden">
          <div class="field">
            <label for="username">Username</label>
            <input id="username" type="text" autocomplete="username" spellcheck="false">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password">
            <p class="hint">Your password is used once to obtain a session token and is never stored.</p>
          </div>
          <div class="row">
            <button id="login-btn" class="btn-primary">Log in</button>
            <span id="login-error" class="error hidden"></span>
          </div>
        </div>

        <div id="logout-row" class="hidden">
          <button id="logout-btn" class="btn-danger">Log out</button>
        </div>
      </section>
    </div>

  </div>

  <script src="options.js"></script>
</body>
</html>
