<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>noncey</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <header>
      <span id="user-label">noncey</span>
      <button id="autofill-toggle" class="toggle-pill on" title="Toggle auto-fill">auto</button>
      <button id="open-options" title="Settings">⚙</button>
    </header>

    <main>
      <!-- shown when not authenticated -->
      <div id="view-auth-required" class="view hidden">
        <p>Not authenticated.</p>
        <button id="go-options">Open Settings</button>
      </div>

      <!-- shown when authenticated but no provider matches the current URL -->
      <div id="view-no-match" class="view hidden">
        <p class="muted">No provider configured for this page.</p>
        <p class="muted small">Configure providers in Settings.</p>
      </div>

      <!-- shown when authenticated and a provider matches -->
      <div id="view-nonces" class="view hidden">
        <div id="config-bar">
          <span id="config-label"></span>
          <button id="config-change-btn" class="btn-link">Change</button>
        </div>
        <div id="config-selector" class="hidden"></div>
        <ul id="nonce-list"></ul>
        <p id="no-nonces" class="muted hidden">Waiting for nonces…</p>
        <div id="prompt-notice" class="hidden">
          ⚠ <button id="prompt-notice-btn" class="btn-link">Configure prompts in Settings</button>
        </div>
      </div>
    </main>

  </div>
  <footer id="account-footer" class="hidden">
    <a id="account-settings-link" href="#" target="_blank">Full Account Settings</a>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
